# M2 agent scale — TLS1.3 terminate, HTTP/2, WS, circuit breaker, queue 429, webhook allowlist
[server]
listen = "127.0.0.1:8443"
document_root = "./public"

[server.tls]
mode = "self_signed"
cert_dir = "./certs-m2"
min_protocol = "1.3"
terminate = true

[server.tls.self_signed]
dev = true
valid_days = 90

[server.http2]
enabled = true
max_concurrent_streams = 128

[limits]
max_body = "1m"
max_header = "16k"
rate_limit_rps = 60
rate_limit_burst = 120
stream_idle_timeout = "120s"
stream_max_duration = "600s"
concurrent_streams = 100

[route.queue]
max_depth = 50
max_wait = "30s"
retry_after = "2s"

[circuit_breaker]
error_threshold = 5
window_sec = 30
open_duration_sec = 15
half_open_probes = 1

[webhooks]
allow = ["https://hooks.example.com/v1/callback"]

[upstreams.llm_default]
peers = ["http://127.0.0.1:11434"]

[routes]
"GET /health" = "static:healthcheck"
"GET /ws/tools require=websocket" = "proxy:llm_default"
"POST /v1/chat/* require=traceparent" = "proxy:llm_default"

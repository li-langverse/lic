name = "nextjs_ssr"
phase = "m1"
enabled = true

[server]
kind = "proxy"
backend = "nextjs_toy"
backend_port = 19002

[verify]
requests = [
  { method = "GET", path = "/ssr/page", expect_status = 200, body_contains = "toy-ssr" },
]

[load]
tool = "wrk"
threads = 4
connections = 20
duration_sec = 8

[metrics]
collect = ["rps", "p50_latency_ms", "p99_latency_ms", "ttfb_ms"]

[parity]
rps_ratio_min = 0.85
ttfb_ratio_min = 0.85
p99_ratio_max = 2.0

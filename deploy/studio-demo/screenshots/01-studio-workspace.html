<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Li World Studio — workspace</title>
  <style>
    body { width: 1920px; height: 1080px; margin: 0; background: #0d1117; color: #e6edf3;
      font-family: system-ui, sans-serif; }
    .dock { position: absolute; left: 0; top: 0; bottom: 0; width: 56px; background: #161b22; }
    .topbar { position: absolute; left: 56px; right: 0; top: 0; height: 44px;
      background: #161b22; display: flex; align-items: center; padding: 0 16px; }
    .viewport { position: absolute; left: 56px; top: 44px; right: 320px; bottom: 0;
      background: radial-gradient(circle at 50% 40%, #1a2332, #0d1117); }
    .inspector { position: absolute; right: 0; top: 44px; width: 320px; bottom: 0;
      background: #161b22; padding: 16px; }
  </style>
</head>
<body>
  <nav class="dock"></nav>
  <header class="topbar">Li World Studio · Drug design</header>
  <main class="viewport"></main>
  <aside class="inspector"><h2>Inspector</h2><p>Selection: Molecule A</p></aside>
</body>
</html>

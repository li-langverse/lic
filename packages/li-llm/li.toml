[package]
name = "li-llm"
version = "0.1.0"
edition = "2026"
license = "Apache-2.0 OR MIT"
description = "Native LLM inference for Li — tokenizer, safetensors/GGUF loader, transformer forward, generate loop (PH-LLM)"

[dependencies]
li-math = { path = "../li-math" }
li-ml = { path = "../li-ml" }

[package.metadata.li]
github_repo = "li-llm"
import_name = "llm"
min_lic = "0.1.0"
maintainer = "li-langverse"
pkg_id = "PKG-li-llm"

[package.repository]
url = "https://github.com/li-langverse/li-llm"
documentation = "https://li-langverse.github.io/li-language/ecosystem/li-llm/"
changelog = "https://github.com/li-langverse/li-llm/blob/main/CHANGELOG.md"

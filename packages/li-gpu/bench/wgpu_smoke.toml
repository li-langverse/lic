# Bench harness hook — read by scripts/bench-studio-viewport-perf.sh
[wgpu_smoke]
hook_version = 2
backend = "wgpu"
status = "readback_pass"
native_device = true
surface_ok = true
readback_fn = "gpu_wgpu_readback_smoke_run"
notes = "Compile-time readback smoke; swapchain pixels require LIG_WGPU_SWAPCHAIN on GPU runner"

[wgpu_swapchain]
hook_version = 1
readback_fn = "gpu_wgpu_swapchain_readback_run"
status = "blocked_runner"
runner_gpu_required = true
env_enable = "LIG_WGPU_SWAPCHAIN"
notes = "wgpu-rs swapchain texture readback — pass only when runner has GPU + lig host present"

name: notify-downstream
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Tag to announce (e.g. v0.1.0)
        required: true
permissions:
  contents: read
jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notify downstream (PAT)
        if: ${{ secrets.LI_DOWNSTREAM_DISPATCH_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.LI_DOWNSTREAM_DISPATCH_TOKEN }}
          VERSION: ${{ github.event.release.tag_name || github.event.inputs.version }}
        run: ./.github/scripts/dispatch-upstream-release.sh lic-release
      - name: Notify downstream (GITHUB_TOKEN fallback)
        if: ${{ secrets.LI_DOWNSTREAM_DISPATCH_TOKEN == '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.release.tag_name || github.event.inputs.version }}
        run: |
          echo "::warning::Set secret LI_DOWNSTREAM_DISPATCH_TOKEN for reliable cross-repo dispatch."
          ./.github/scripts/dispatch-upstream-release.sh lic-release

# Profiles and scenario toggles — harness reads names from here only.

default_profile = "default"

[profiles.ci]
scenarios = ["static_small"]
timing = false

[profiles.baseline]
scenarios = ["static_small", "static_large"]
timing = true
langs = ["nginx"]

[profiles.parity]
scenarios = ["static_small", "keepalive_pipelining"]
timing = true
langs = ["nginx", "li"]

[profiles.nextjs_parity]
scenarios = ["nextjs_api", "nextjs_ssr", "nextjs_sse"]
timing = true
langs = ["nginx", "li"]

[profiles.nextjs_ci]
scenarios = ["nextjs_api", "nextjs_ssr", "nextjs_sse", "nextjs_ws"]
timing = false

[profiles.parity_streaming]
scenarios = ["sse_long_stream", "ws_fanout"]
timing = true
langs = ["nginx", "li"]

[profiles.streaming_ci]
scenarios = ["sse_long_stream", "ws_fanout"]
timing = false
langs = ["li"]

[profiles.default]
scenarios = ["static_small", "keepalive_pipelining"]
timing = false

[default]
include = ["static_small", "static_large", "keepalive_pipelining"]
exclude = ["h2_static", "tcp_echo", "proxy_loopback", "nextjs_api", "nextjs_ssr", "nextjs_sse", "nextjs_ws", "sse_long_stream", "ws_fanout"]

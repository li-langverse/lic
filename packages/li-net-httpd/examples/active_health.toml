# M1 — active upstream health probes (dead peer removed from LB before user traffic)
[server]
listen = "127.0.0.1:18100"
document_root = "./public"

[limits]
max_body = "1m"
max_header = "16k"
rate_limit_rps = 1000
rate_limit_burst = 2000

[health]
max_fails = 1
fail_timeout = "30s"

[health.active]
path = "/"
interval = "1s"

[upstreams.api]
peers = ["http://127.0.0.1:18101", "http://127.0.0.1:18102"]

[routes]
"GET /*" = "proxy:api"

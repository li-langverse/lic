# Multi-vendor timing registry for `lig` (PH-HW WP1 schema).
# cuda / hip / metal = "N/A" until LIG_EMIT_CUDA=1 LIG_EMIT_HIP=1 LIG_EMIT_METAL=1
# Timed CPU pilot: benchmarks/results/lig-lkir-matmul.json

[meta]
version = 1
package = "lig"
vendor_na_until_emit = "cuda,hip,metal"
emit_env_cuda = "LIG_EMIT_CUDA=1"
emit_env_hip = "LIG_EMIT_HIP=1"
emit_env_metal = "LIG_EMIT_METAL=1"

[[kernel]]
id = "lig.kernel.matmul_f32"
bench_name = "matmul_f32"
lkir = "lkir/matmul_f32.li"
validity_ref = "cpu"
workload_class = "stub"
cpu = ""
cuda = "N/A"
hip = "N/A"
metal = "N/A"
custom_lab = ""


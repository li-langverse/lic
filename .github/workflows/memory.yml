# Optional memory + security smoke (Linux). Does not gate default CI on macOS.
name: Memory

on:
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: memory-${{ github.ref }}
  cancel-in-progress: true

jobs:
  memory-linux:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/li-langverse/lic-ci:ubuntu24-llvm22
    env:
      LLVM_DIR: /usr/lib/llvm-22/lib/cmake/llvm
      CC: clang-22
      CXX: clang++-22
    steps:
      - uses: actions/checkout@v4

      - name: Install valgrind (not in lic-ci image)
        run: apt-get update && apt-get install -y -qq valgrind

      - name: Cache build/
        uses: actions/cache@v4
        with:
          path: build
          key: lic-memory-ubuntu24-llvm22-${{ hashFiles('compiler/**', 'CMakeLists.txt', 'cmake/**') }}
          restore-keys: |
            lic-memory-ubuntu24-llvm22-

      - name: Build lic
        run: |
          chmod +x scripts/build.sh scripts/memory-ci.sh scripts/profile-memory.sh
          ./scripts/build.sh

      - name: Memory + security smoke
        run: ./scripts/memory-ci.sh

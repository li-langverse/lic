name: Benchmarks

on:
  workflow_dispatch:
  # Full multi-OS nightly + dashboard ingest: li-langverse/benchmarks benchmark-nightly.yml
  push:
    branches: [main, dev]
    paths:
      - "benchmarks/**"
      - ".github/workflows/benchmarks.yml"

jobs:
  tier1-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Checkout lip + lit (ecosystem siblings for ci.sh)
        run: |
          chmod +x scripts/checkout-ecosystem-siblings.sh
          ./scripts/checkout-ecosystem-siblings.sh

      - name: Install LLVM 22 and build tools
        run: |
          chmod +x scripts/ci-install-llvm.sh
          sudo LI_LLVM_MAJOR=22 bash scripts/ci-install-llvm.sh

      - name: Tier-0 gate + optional tier-1 smoke (full perf: benchmarks nightly)
        env:
          LLVM_DIR: /usr/lib/llvm-22/lib/cmake/llvm
          CC: clang-22
          CXX: clang++-22
        run: |
          chmod +x scripts/ci.sh scripts/ci-bench.sh scripts/build.sh
          ./scripts/ci.sh
          # Perf matrix runs in li-langverse/benchmarks benchmark-nightly.yml
          BENCH_PACKAGE=lig ./scripts/ci-bench.sh || ./scripts/ci-bench.sh

      - name: Upload benchmark CSV
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-csv
          path: |
            benchmarks/results/latest.csv
            benchmarks/results/stability.csv
            benchmarks/results/verify.csv
            benchmarks/results/security.csv
          if-no-files-found: warn

      - name: Dispatch benchmarks ingest
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        env:
          GH_TOKEN: ${{ secrets.LI_BENCHMARKS_DISPATCH_TOKEN }}
        run: |
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "LI_BENCHMARKS_DISPATCH_TOKEN not set — skip dispatch"
            exit 0
          fi
          gh api repos/li-langverse/benchmarks/dispatches \
            -f event_type=lic-bench-complete \
            -f client_payload[ref]="${{ github.sha }}" \
            -f client_payload[run_url]="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

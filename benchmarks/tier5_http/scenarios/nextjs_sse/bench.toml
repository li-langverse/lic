name = "nextjs_sse"
phase = "m15"
enabled = true

[server]
kind = "proxy"
backend = "nextjs_toy"
backend_port = 19003

[verify]
target = "backend"
requests = [
  { method = "GET", path = "/api/sse", expect_status = 200, body_contains = "event: tick" },
]

[load]
tool = "wrk"
threads = 2
connections = 20
duration_sec = 4

[metrics]
collect = ["rps", "ttfb_ms"]

[parity]
# SSE is verify-first; wrk RPS is not comparable to nginx (chunked/event-stream pump).
verify_only = true
rps_ratio_min = 0.85
ttfb_ratio_min = 0.85

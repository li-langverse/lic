name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Version + changelog gate
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          chmod +x scripts/check-version.sh
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ./scripts/check-version.sh --pr
          else
            ./scripts/check-version.sh
          fi

  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-18 llvm-18-dev zlib1g-dev libzstd-dev python3

      - name: CI (build + li-tests + tier-0 benchmarks)
        env:
          LLVM_DIR: /usr/lib/llvm-18/lib/cmake/llvm
          CC: clang-18
          CXX: clang++-18
        run: |
          chmod +x scripts/ci.sh scripts/build.sh scripts/check-version.sh
          ./scripts/ci.sh
          ./scripts/check-version.sh --build

  build-and-test-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18
        run: brew install llvm@18 cmake ninja

      - name: CI (build + li-tests + tier-0 benchmarks)
        run: |
          chmod +x scripts/ci.sh scripts/build.sh scripts/check-version.sh
          LLVM_DIR="$(brew --prefix llvm@18)/lib/cmake/llvm"
          export LLVM_DIR
          # Link against Homebrew LLVM, but compile with Xcode clang++/libc++
          # (brew llvm@18's clang++ breaks libc++ header order on GHA macOS).
          export CC=clang
          export CXX=clang++
          ./scripts/ci.sh
          ./scripts/check-version.sh --build

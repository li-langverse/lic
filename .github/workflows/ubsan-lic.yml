# Nightly UBSan build of lic (Linux). Non-blocking until link is stable everywhere.
name: UBSan lic

on:
  schedule:
    - cron: "0 5 * * 2"
  workflow_dispatch:

jobs:
  ubsan-lic:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/li-langverse/lic-ci:ubuntu24-llvm22
    continue-on-error: true
    env:
      LLVM_DIR: /usr/lib/llvm-22/lib/cmake/llvm
      CC: clang-22
      CXX: clang++-22
    steps:
      - uses: actions/checkout@v4

      - name: Build lic with UBSan
        run: |
          cmake -B build-ubsan -G Ninja -DLLVM_DIR="$LLVM_DIR" -DLI_SANITIZE=undefined
          cmake --build build-ubsan --target lic

      - name: Smoke check under UBSan
        run: |
          ./build-ubsan/compiler/lic/lic check li-tests/lexer_parser/fib.li
          ./build-ubsan/compiler/lic/lic parse li-tests/security/empty.li

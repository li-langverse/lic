# PH-MMO-3 — local MMORPG stack (dev). Wire binaries when mmo-shard/gateway land.
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mmo
      POSTGRES_PASSWORD: mmo
      POSTGRES_DB: mmo
    ports:
      - "5432:5432"

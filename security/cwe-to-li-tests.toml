# Maps CWE classes to Li test obligations. Used by scripts/check-cve-coverage.sh.
# Patterns with existing = true are covered by other li-tests suites.

[[pattern]]
cwe = "CWE-120"
li_obligation = "compile_fail_or_proved_bound"
suite = "cve_patterns"
template = "cwe120_stack_buffer_oob.li"
notes = "Classic stack buffer overflow via unchecked fixed array index"

[[pattern]]
cwe = "CWE-121"
li_obligation = "compile_fail_or_proved_bound"
suite = "cve_patterns"
template = "cwe787_oob_index.li"
notes = "Stack-based buffer overflow (constant index OOB)"

[[pattern]]
cwe = "CWE-122"
li_obligation = "compile_fail_or_proved_bound"
suite = "cve_patterns"
template = "cwe787_dyn_index.li"
notes = "Heap OOB analogue — dynamic int index without refinement"

[[pattern]]
cwe = "CWE-125"
li_obligation = "compile_fail_or_proved_bound"
suite = "cve_patterns"
template = "cwe125_negative_index.li"
notes = "Out-of-bounds read via negative constant index"

[[pattern]]
cwe = "CWE-787"
li_obligation = "compile_fail_or_proved_bound"
suite = "cve_patterns"
template = "cwe787_oob_index.li"
notes = "Out-of-bounds write — constant index past array end"

[[pattern]]
cwe = "CWE-788"
li_obligation = "compile_fail_or_proved_bound"
suite = "cve_patterns"
template = "cwe787_oob_index.li"
notes = "OOB write variant — same Li rejection as CWE-787"

[[pattern]]

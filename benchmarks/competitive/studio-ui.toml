# Studio UI/UX competitive bench registry (PH-UX).
# Harness: ./scripts/bench-studio-viewport-perf.sh
# Validate: python3 scripts/studio-ui-ux-verify-bench-registry.py
# Agent: studio_ui_ux_builder plan loop

[meta]
version = 1
updated = "2026-05-25"
review_days_warn = 30
schema = "li_studio_ui_bench_v1"

[harness]
script = "scripts/bench-studio-viewport-perf.sh"
output_latest = "data/studio-ui-ux-plan-loop/latest-bench.json"
output_competitive = "benchmarks/results/bench-studio-viewport-perf.json"
memory_script = "scripts/profile-animate-memory.sh"
memory_profile_latest = "data/studio-ui-ux-plan-loop/latest-memory-profile.json"

[[hook]]
id = "viewport_fps"
package = "li-render"
path = "packages/li-render/bench/viewport_fps.toml"
gates = ["viewport_fps"]

[[hook]]
id = "wgpu_smoke"
package = "li-gpu"
path = "packages/li-gpu/bench/wgpu_smoke.toml"
gates = []

[[hook]]
id = "panel_switch"
package = "li-gui"
path = "packages/li-gui/bench/panel_switch.toml"
gates = ["panel_switch_ms"]

[[hook]]
id = "studio_compose"
package = "li-studio"
path = "packages/li-studio/bench/studio_compose.toml"
gates = ["panel_switch_ms", "studio_load_ms"]

[[hook]]
id = "particle_tiers"
package = "li-scene"
path = "packages/li-scene/bench/particle_tiers.toml"
gates = ["md_1k", "md_10k", "md_100k"]

[[hook]]
id = "palette_latency"
package = "li-ui"
path = "packages/li-ui/bench/palette_latency.toml"
gates = ["palette_open_ms", "palette_filter_ms"]

[[hook]]
id = "gpu_fail_recovery"
package = "li-studio"
path = "packages/li-studio/bench/gpu_fail_recovery.toml"
gates = ["gpu_fail_retry_ms"]

[[hook]]
id = "keyboard_journey"
package = "li-gui"
path = "packages/li-gui/bench/keyboard_journey.toml"
gates = ["keyboard_tab_ms", "keyboard_shortcut_ms"]

[[hook]]
id = "agent_chrome"
package = "li-ui"
path = "packages/li-ui/bench/agent_chrome.toml"
gates = ["agent_tick_ms", "agent_cancel_ms"]

[[gate]]
id = "viewport_fps"
target = 60
unit = "fps"
compare = "meets_target"
notes = "Sustained viewport; native HUD when available"

[[gate]]
id = "panel_switch_ms"
target = 100
unit = "ms"
compare = "lte"
notes = "Inspector/profile/palette panel transitions"

[[gate]]
id = "studio_load_ms"
target = 2000
unit = "ms"
compare = "lte"
notes = "Cold start to interactive shell"

[[gate]]
id = "palette_open_ms"
target = 50
unit = "ms"
compare = "lte"
notes = "Command palette open to first paint (UX-04)"

[[gate]]
id = "palette_filter_ms"
target = 30
unit = "ms"
compare = "lte"
notes = "Fuzzy filter keystroke to result list refresh (UX-04)"

[[gate]]
id = "gpu_fail_retry_ms"
target = 100
unit = "ms"
compare = "lte"
notes = "GPU fail strip retry affordance latency (UX-08)"

[[gate]]
id = "keyboard_tab_ms"
target = 16
unit = "ms"
compare = "lte"
notes = "Tab focus move between dock/viewport/inspector (UX-09)"

[[gate]]
id = "keyboard_shortcut_ms"
target = 16
unit = "ms"
compare = "lte"
notes = "Cmd+K palette shortcut response (UX-09)"

[[gate]]
id = "agent_tick_ms"
target = 16
unit = "ms"
compare = "lte"
notes = "Agent stream step tick on native shell (UX-06)"

[[gate]]
id = "agent_cancel_ms"
target = 16
unit = "ms"
compare = "lte"
notes = "Agent cancel one-click response on native shell (UX-06)"

[[particle_tier]]
id = "md_1k"
particles = 1000
fps_target = 60
kernel = "md_lennard_jones"
scene_hook = "packages/li-scene/bench/particle_tiers.toml"

[[particle_tier]]
id = "md_10k"
particles = 10000
fps_target = 60
kernel = "md_lennard_jones"

[[particle_tier]]
id = "md_100k"
particles = 100000
fps_target = 30
kernel = "md_lennard_jones"

[[memory]]
id = "animate_md_import"
script = "scripts/profile-animate-memory.sh"
warn_peak_mib = 512

# Official package mirror CI — required for every li-langverse package repo.
# Copied by: ./scripts/li-new-package --official  and  ./scripts/ensure-package-ci.sh
# Reusable workflow: li-langverse/lic/.github/workflows/package-ci.yml (LLVM 22 via lic-ci image).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    uses: li-langverse/lic/.github/workflows/package-ci.yml@main

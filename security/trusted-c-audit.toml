# Manual audit matrix for trusted C code linked into Li binaries.
# ASan rows run via scripts/profile-memory.sh (--asan-md, --asan-rt).

[[file]]
path = "runtime/li_rt.c"
status = "active"
asan_in_ci = true
notes = "Minimal runtime: panic, bounds fail, print, OpenMP dispatch"

[[file.functions]]
name = "li_bounds_fail"
cwe = "CWE-787"
mitigation = "abort on proven violation; no silent OOB"
cve_refs = []

[[file.functions]]
name = "li_rt_argv"
cwe = "CWE-125"
mitigation = "bounds check on index before argv access"
cve_refs = ["CVE-2014-0160"]

[[file.functions]]
name = "li_omp_parallel_for_i64"
cwe = "CWE-362"
mitigation = "OpenMP static schedule; Li parallel policy enforces disjointness"
cve_refs = []

[[file]]
path = "benchmarks/tier2_physics/md_lennard_jones/common/md_core.c"
status = "active"
asan_in_ci = true
notes = "Reference MD kernel — ASan in memory-ci via md_lj_native"

[[file.functions]]
name = "md_step"
cwe = "CWE-787"
mitigation = "fixed particle count; cell list bounds"
cve_refs = []

[[file]]
path = "runtime/li_rt_net.c"
status = "planned"
asan_in_ci = false
notes = "Future li-httpd syscall seam — not shipped in v1"

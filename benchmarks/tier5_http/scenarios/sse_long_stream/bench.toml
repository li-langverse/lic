name = "sse_long_stream"
phase = "m15"
enabled = true

[server]
kind = "proxy"
backend = "streaming_soak"
backend_port = 19101

[verify]
target = "edge"
requests = [
  { method = "GET", path = "/stream/sse?count=15&interval_ms=15", expect_status = 200, body_contains = "event: tick" },
]

[load]
tool = "streaming_soak"
kind = "sse"
concurrent = 4
events_min = 20
duration_sec = 6

[metrics]
collect = ["rps", "stream_ok_ratio"]

[parity]
# SSE long stream is event-bound (one soak per connection); gate stream_ok_ratio not wrk RPS.
rps_handshake_bound = true
stream_ok_ratio_min = 0.50
rps_ratio_min = 0.85
p99_ratio_max = 2.0

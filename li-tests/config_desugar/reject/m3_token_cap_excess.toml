# M3 reject — max_per_request above schema cap
[server]
listen = "127.0.0.1:8080"
document_root = "./public"

[limits]
max_body = "1m"
rate_limit_rps = 60

[limits.token_budget]
enabled = true
max_per_request = 99999999

[upstreams.llm_default]
peers = ["http://127.0.0.1:11434"]

[routes]
"POST /v1/chat/*" = "proxy:llm_default"

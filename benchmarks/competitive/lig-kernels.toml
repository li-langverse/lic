# lig multi-vendor kernel bench registry (PH-HW WP1 schema).
# Agents: add [[kernel]] rows when catalog IDs land; do not weaken ratio policy.
# Validate: ./scripts/check-hpc-competitive.sh (extend for lig-kernels when WP2 wires harness)
# Catalog: docs/game-dev/lig-kernel-catalog.md
# RFC: docs/game-dev/specs/lig-rfc.md

[meta]
version = 1
package = "lig"
updated = "2026-05-25"
ratio_policy = "cpu_oracle"   # report speedup vs cpu column unless stub
columns = ["cpu", "cuda", "hip", "metal", "custom_lab"]
units = "seconds"
workload_class_default = "stub"

# Column semantics:
#   cpu        — host reference (OpenMP or pure Li CPU path)
#   cuda       — NVIDIA via LKIR → CUDA
#   hip        — AMD ROCm/HIP
#   metal      — Apple Metal
#   custom_lab — gated lab manifest (manual ingest)
# Empty string = not run yet (honest stub).

[[kernel]]
id = "lig.kernel.matmul_f32"
bench_name = "matmul_f32"
lkir = "lkir/matmul_tile.lkir"
validity_ref = "cpu"
memory_contract = "aligned_2d"
perf_tier = "tier1"
workload_class = "stub"
cpu = ""
cuda = ""
hip = ""
metal = ""
custom_lab = ""

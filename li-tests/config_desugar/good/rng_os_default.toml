# rng-concepts — default OsRng (mode omitted) with TLS.
[server]
listen = "127.0.0.1:8443"
document_root = "./public"

[server.tls]
mode = "self_signed"
cert_dir = "./certs-dev"
min_protocol = "1.3"

[limits]
max_body = "1m"
max_header = "16k"
rate_limit_rps = 60
rate_limit_burst = 120

[routes]
"GET /health" = "static:healthcheck"

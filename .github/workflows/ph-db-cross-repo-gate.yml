# WP-G: manual PH-DB cross-repo aggregator (dispatch only — not a PR matrix).
# Runs lidb gate + lis db-smoke in one job; does not replace per-repo PR workflows.
name: PH-DB cross-repo gate (manual)

on:
  workflow_dispatch:
    inputs:
      lidb_ref:
        description: lidb git ref
        required: false
        default: main
      lis_ref:
        description: lis git ref
        required: false
        default: main

jobs:
  ph-db-gate:
    runs-on: ubuntu-24.04
    env:
      LIDB_CI_REF: ${{ inputs.lidb_ref }}
      LIS_CI_REF: ${{ inputs.lis_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: li-langverse/lidb
          path: lidb
          ref: ${{ env.LIDB_CI_REF }}

      - uses: actions/checkout@v4
        with:
          repository: li-langverse/lis
          path: lis
          ref: ${{ env.LIS_CI_REF }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cmake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: lidb smoke + pytest subset
        working-directory: lidb
        run: |
          chmod +x scripts/*.sh
          bash scripts/ci_ph_db_gate.sh

      - name: lis db-smoke + supervisor pytest
        working-directory: lis
        env:
          LIDB_REPO: ${{ github.workspace }}/lidb
          PYTHONPATH: ${{ github.workspace }}/lis
        run: |
          python3 -m pip install -e . pytest -q
          chmod +x scripts/*.sh
          ./scripts/db-smoke.sh
          python3 -m pytest li-tests/test_db_supervisor.py -q --tb=short

      - name: Summary
        run: |
          echo "PH-DB cross-repo gate finished (dispatch-only orchestrator)."
          echo "Engine e2e: trigger li-cursor-agents ph-db-lidb-engine.yml separately."

name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Decide whether to release
        id: gate
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists — skipping"
            exit 0
          fi

          PREV="$(git show HEAD~1:VERSION 2>/dev/null | tr -d '[:space:]' || true)"
          if [[ -n "$PREV" && "$PREV" == "$VERSION" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "VERSION unchanged (${VERSION}); release only on VERSION bump"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          if [[ -n "$PREV" ]]; then
            echo "VERSION bumped ${PREV} -> ${VERSION}"
          else
            echo "First VERSION on main (${VERSION})"
          fi

      - name: Validate changelog and version format
        if: steps.gate.outputs.skip == 'false'
        run: |
          chmod +x scripts/check-version.sh
          ./scripts/check-version.sh

      - name: Create GitHub Release
        if: steps.gate.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.gate.outputs.tag }}"
          VERSION="${{ steps.gate.outputs.version }}"
          chmod +x scripts/changelog-notes.sh
          if NOTES="$(./scripts/changelog-notes.sh "$VERSION")"; then
            :
          else
            NOTES="See CHANGELOG.md for version ${VERSION}."
          fi
          gh release create "$TAG" \
            --title "Li ${VERSION}" \
            --notes "$NOTES" \
            --target "${{ github.event.workflow_run.head_sha }}"

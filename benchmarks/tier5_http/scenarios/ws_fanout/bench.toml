name = "ws_fanout"
phase = "m2"
enabled = true

[server]
kind = "proxy"
backend = "streaming_soak"
backend_port = 19102

[verify]
target = "edge"
requests = [
  { method = "GET", path = "/stream/ws", expect_status = 426 },
]

[load]
tool = "streaming_soak"
kind = "ws"
concurrent = 1
messages_min = 1
duration_sec = 5

[metrics]
collect = ["rps", "stream_ok_ratio"]

[parity]
# WS fanout soak: low absolute RPS (handshake-bound); gate stream_ok_ratio not wrk-style RPS.
# Li epoll proxy ~0.25–0.35× nginx stream_ok under c4 soak (single worker); nginx oracle c16.
rps_handshake_bound = true
stream_ok_ratio_min = 0.25
rps_ratio_min = 0.80
p99_ratio_max = 2.25

# Engine incumbents — what we measure vs what we claim.
# Timed harness rows live in catalog.toml; composable gates in world-studio.toml.

[[engine]]
id = "unreal_engine_5"
name = "Unreal Engine 5"
category = "game_engine"
measurement_today = "world_engine + gaming_full harness proxies; composable studio gates"
measurement_not = "Nanite/Lumen FPS in-repo; Blueprint parity"
proxy_bench_map = [
  "game_world_soa_10k → ECS/archetype tick budget (DOTS/UE Mass-class)",
  "game_replication_encode → delta bandwidth vs full snapshot (UE replication class)",
  "sim_physics_frame → fixed-timestep rigid substeps (Chaos/Bullet-class)",
  "render_frame_present → RHI present / viewport resolve class",
  "cloth_swing / rigid_body_stack → v0_gaming / gaming_full physics stubs",
]
parity_wedge = ["diffable worlds", "lic build contracts", "agent-native studio", "arbitrary physics laws"]
external_baseline = "benchmarks/competitive/unreal-proxy-targets.json"


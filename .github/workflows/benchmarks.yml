name: Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: [main, dev]
    paths:
      - "benchmarks/**"
      - ".github/workflows/benchmarks.yml"

jobs:
  tier1-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-18 llvm-18-dev zlib1g-dev libzstd-dev python3

      - name: Build and tier-1 bench smoke
        env:
          LLVM_DIR: /usr/lib/llvm-18/lib/cmake/llvm
          CC: clang-18
          CXX: clang++-18
        run: |
          chmod +x scripts/ci.sh scripts/ci-bench.sh scripts/build.sh
          ./scripts/ci.sh
          ./scripts/ci-bench.sh

      - name: Tier-3 ecosystem benchmarks (compile, async, security timing)
        run: |
          python3 benchmarks/harness/bench_ecosystem.py --runs 2

      - name: Upload benchmark CSV
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-csv
          path: |
            benchmarks/results/latest.csv
            benchmarks/results/stability.csv
            benchmarks/results/verify.csv
            benchmarks/results/security.csv
          if-no-files-found: warn

      - name: Dispatch benchmarks ingest
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        env:
          GH_TOKEN: ${{ secrets.LI_BENCHMARKS_DISPATCH_TOKEN }}
        run: |
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "LI_BENCHMARKS_DISPATCH_TOKEN not set — skip dispatch"
            exit 0
          fi
          gh api repos/li-langverse/benchmarks/dispatches \
            -f event_type=lic-bench-complete \
            -f client_payload[ref]="${{ github.sha }}" \
            -f client_payload[run_url]="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

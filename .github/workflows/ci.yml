name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-18 llvm-18-dev python3

      - name: CI (build + li-tests + tier-0 benchmarks)
        env:
          LLVM_DIR: /usr/lib/llvm-18/lib/cmake/llvm
          CC: clang-18
          CXX: clang++-18
        run: |
          chmod +x scripts/ci.sh scripts/build.sh
          ./scripts/ci.sh

  build-and-test-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18
        run: brew install llvm@18 cmake ninja

      - name: CI (build + li-tests + tier-0 benchmarks)
        run: |
          chmod +x scripts/ci.sh scripts/build.sh
          LLVM_DIR="$(brew --prefix llvm@18)/lib/cmake/llvm"
          export LLVM_DIR
          export CC="$(brew --prefix llvm@18)/bin/clang"
          export CXX="$(brew --prefix llvm@18)/bin/clang++"
          ./scripts/ci.sh

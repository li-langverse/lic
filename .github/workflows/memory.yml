# Optional memory + security smoke (Linux). Does not gate default CI on macOS.
name: Memory

on:
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: memory-${{ github.ref }}
  cancel-in-progress: true

jobs:
  memory-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Checkout lip + lit + benchmarks (GitHub siblings)
        run: |
          chmod +x scripts/checkout-ecosystem-siblings.sh
          ./scripts/checkout-ecosystem-siblings.sh

      - name: Install LLVM 22 and build tools
        run: |
          chmod +x scripts/ci-install-llvm.sh
          sudo LI_LLVM_MAJOR=22 bash scripts/ci-install-llvm.sh
          sudo apt-get install -y -qq valgrind

      - name: Build lic
        env:
          LLVM_DIR: /usr/lib/llvm-22/lib/cmake/llvm
          CC: clang-22
          CXX: clang++-22
        run: |
          chmod +x scripts/build.sh scripts/memory-ci.sh scripts/profile-memory.sh
          ./scripts/build.sh

      - name: Memory + security smoke
        env:
          LLVM_DIR: /usr/lib/llvm-22/lib/cmake/llvm
          CC: clang-22
          CXX: clang++-22
        run: ./scripts/memory-ci.sh


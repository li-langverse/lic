[package]
name = "li-player"
version = "0.1.0"
edition = "2026"
license = "Apache-2.0 OR MIT"
description = "Li game player — headless play + publish bundle ship from World Studio game profile (PH-GD-6)"

[dependencies]
li-studio = { path = "../li-studio" }
li-sim = { path = "../li-sim" }

[package.metadata.li]
github_repo = "li-player"
import_name = "player"
min_lic = "0.1.0"
maintainer = "li-langverse"
pkg_id = "PKG-li-player"

[package.repository]
url = "https://github.com/li-langverse/li-player"
documentation = "https://li-langverse.github.io/li-language/ecosystem/li-player/"
changelog = "https://github.com/li-langverse/li-player/blob/main/CHANGELOG.md"

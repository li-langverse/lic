name: Proofs site

on:
  push:
    branches: [main]
    paths:
      - "proof-db/**"
      - "data/proof-db/**"
      - "docs/verification/provability-gaps.md"
      - "docs/verification/proof-database/**"
      - "scripts/build-proofs-pages.py"
      - "scripts/build-proofs-pages.sh"
      - ".github/workflows/proofs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: proofs-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build proofs site
        run: |
          chmod +x scripts/build-proofs-pages.sh
          ./scripts/build-proofs-pages.sh

      - name: Verify artifact
        run: test -s site-proofs/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site-proofs

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

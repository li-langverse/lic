name: Lean semantics

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

jobs:
  lake-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 and build lic
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-18 llvm-18-dev zlib1g-dev libzstd-dev
          cmake -B build -G Ninja -DLLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm -DCMAKE_C_COMPILER=clang-18 -DCMAKE_CXX_COMPILER=clang++-18
          cmake --build build -j "$(nproc)" --target lic

      - name: Install elan (Lean 4)
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain stable
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Generate AutoVC and lake build
        env:
          LI_REPO_ROOT: ${{ github.workspace }}
          LI_BUILD_VERIFY_LEAN: "1"
        run: |
          LIC="${{ github.workspace }}/build/compiler/lic/lic"
          "$LIC" build li-tests/contracts_verify/sqrt_contract.li -o /dev/null
          (cd docs/semantics && lake build)
          chmod +x scripts/check-autovc-open-goals.sh
          ./scripts/check-autovc-open-goals.sh || {
            echo "Note: open goals expected until 2f discharge lands; see provability-gaps G-lean"
            exit 0
          }

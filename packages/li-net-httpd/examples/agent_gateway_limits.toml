# M1 agent gateway — proxy routes with global rate_limit_rps (maps to runtime token bucket)
[server]
listen = "127.0.0.1:39221"
document_root = "./public"

[limits]
max_body = "1m"
max_header = "16k"
rate_limit_rps = 60
rate_limit_burst = 120

[upstreams.llm]
peers = ["http://127.0.0.1:11434"]

[routes]
"GET /health" = "static:healthcheck"
"POST /v1/chat/*" = "proxy:llm"

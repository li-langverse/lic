# M1 production daemon — proxy via .conf; static+keep-alive via argv (see test-serve-production.sh)
[server]
listen = "127.0.0.1:18110"
document_root = "./public"
workers = 2

[limits]
max_body = "1m"
max_header = "16k"
rate_limit_rps = 1000
rate_limit_burst = 2000

[upstreams.api]
peers = ["http://127.0.0.1:18111"]

[routes]
"GET /*" = "proxy:api"

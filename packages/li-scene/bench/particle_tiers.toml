# Bench harness hook — read by scripts/bench-studio-viewport-perf.sh
# PH-UX: md_lennard_jones display tiers with honest FPS (native_pixels=false until wgpu draws).

[meta]
hook_version = 1
package = "li-scene"
kernel = "md_lennard_jones"
native_pixels = false
draw_path = "scene_budget_simulate"

[[tier]]
id = "md_1k"
tier_id = 0
particles = 1000
fps_target = 60
bench_simulate_fn = "scene_bench_particle_tier_simulate"

[[tier]]
id = "md_10k"
tier_id = 1
particles = 10000
fps_target = 60
bench_simulate_fn = "scene_bench_particle_tier_simulate"

[[tier]]
id = "md_100k"
tier_id = 2
particles = 100000
fps_target = 30
bench_simulate_fn = "scene_bench_particle_tier_simulate"

[bench]
all_tiers_fn = "scene_bench_all_particle_tiers_pass"
sample_frames = 120

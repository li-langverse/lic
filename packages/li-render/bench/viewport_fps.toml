# Bench harness hook — read by scripts/bench-studio-viewport-perf.sh
[viewport]
fps_target = 60
native_pixels = true
fps_counter_hook = "render_fps_counter_meets_target"
bench_simulate_fn = "render_bench_fps_counter_simulate"
bench_native_fn = "render_bench_fps_counter_native"
draw_path = "wgpu_readback"

[wgpu_smoke]
package = "li-gpu"
status = "readback_pass"
surface_ok = true

[fps_counter]
package = "li-render"
hook_version = 2
display_fn = "render_fps_counter_display_fps"
target_fn = "render_viewport_fps_target"

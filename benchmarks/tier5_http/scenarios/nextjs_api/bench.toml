name = "nextjs_api"
phase = "m1"
enabled = true

[server]
kind = "proxy"
backend = "nextjs_toy"
backend_port = 19001

[verify]
requests = [
  { method = "GET", path = "/api/hello", expect_status = 200, body_contains = "\"ok\"" },
]

[load]
tool = "wrk"
threads = 4
connections = 100
duration_sec = 8

[metrics]
collect = ["rps", "p50_latency_ms", "p99_latency_ms", "ttfb_ms"]

[parity]
rps_ratio_min = 0.85
ttfb_ratio_min = 0.85
p99_ratio_max = 2.0

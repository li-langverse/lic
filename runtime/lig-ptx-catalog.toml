# WP-HW-09: embedded CUDA PTX catalog (honest pilot — not LKIR→nvcc emit).
# Regenerate inc: bash scripts/gen-lig-cuda-matmul-ptx.sh
# Gate: bash scripts/check-lig-ptx-catalog.sh

[meta]
version = 1
emit_env = "LIG_EMIT_CUDA=1"
device_timing_probe = "scripts/lig-cuda-timing-probe.sh"

[[embedded]]

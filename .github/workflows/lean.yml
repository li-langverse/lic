name: Lean semantics

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

jobs:
  lake-build:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/li-langverse/lic-ci:ubuntu24-llvm22
    permissions:
      contents: read
      packages: read
    env:
      LLVM_DIR: /usr/lib/llvm-22/lib/cmake/llvm
    steps:
      - uses: actions/checkout@v4

      - name: Git safe.directory (container)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Cache build/
        uses: actions/cache@v4
        with:
          path: build
          key: lic-lean-ubuntu24-llvm22-${{ hashFiles('compiler/**', 'CMakeLists.txt', 'cmake/**') }}
          restore-keys: |
            lic-lean-ubuntu24-llvm22-

      - name: Build lic (LLVM 22 in container image)
        run: |
          cmake -B build -G Ninja -DLLVM_DIR="$LLVM_DIR" -DCMAKE_C_COMPILER=clang-22 -DCMAKE_CXX_COMPILER=clang++-22
          cmake --build build -j "$(nproc)" --target lic

      - name: Install elan (Lean 4)
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain stable
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Discharge corpus + P-linalg AutoVC lake typecheck
        env:
          LI_REPO_ROOT: ${{ github.workspace }}
        run: |
          chmod +x scripts/check-autovc-open-goals.sh scripts/lean-verify-stub.sh \
            li-tests/tooling/discharge_trivial_lean.sh \
            li-tests/tooling/discharge_linalg_int_lean.sh \
            li-tests/tooling/contracts_verify_lean.sh \
            li-tests/tooling/glean_strict_build_smoke.sh
          ./li-tests/tooling/discharge_trivial_lean.sh
          LIC="${{ github.workspace }}/build/compiler/lic/lic"
          "$LIC" build li-tests/contracts_verify/sqrt_contract.li -o /dev/null
          ./li-tests/tooling/discharge_linalg_int_lean.sh
          "$LIC" build li-tests/contracts_verify/linalg_dot4_float_closed.li -o /dev/null
          (cd docs/semantics && lake build AutoVC Discharge ProofDB)
          ./li-tests/tooling/glean_strict_build_smoke.sh
